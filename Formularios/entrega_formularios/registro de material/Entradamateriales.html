<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrada Materiales — Hebratech</title>

<link href="https://fonts.googleapis.com/css2?family=Graduate&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --dark:   #2C3333;
    --mid:    #395B64;
    --accent: #A5C9CA;
    --light:  #E7F6F2;
    --muted:  #7aadb0;
    --radius: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Barlow', sans-serif;
    background: var(--dark);
    color: var(--light);
    min-height: 100vh;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed; inset: 0;
    background:
        radial-gradient(ellipse 70% 50% at 10% 0%,  rgba(165,201,202,.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 90% 95%, rgba(57,91,100,.30)   0%, transparent 55%);
    pointer-events: none; z-index: 0;
}

/* ── NAVBAR ── */
nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 64px;
    background: rgba(44,51,51,.90);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(165,201,202,.2);
}

.nav-logo { font-family:'Graduate',serif; font-size:20px; color:var(--accent); letter-spacing:3px; }

.nav-back {
    display:flex; align-items:center; gap:8px;
    text-decoration:none; color:var(--muted); font-size:13px; letter-spacing:1px;
    transition:color .2s;
}
.nav-back:hover { color:var(--light); }
.nav-back::before { content:'←'; font-size:16px; }

/* ── PÁGINA ── */
.page {
    position: relative; z-index: 1;
    max-width: 900px; margin: 0 auto;
    padding: 50px 30px 80px;
    animation: fadeUp .5s ease both;
}

@keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
}

.page-header { margin-bottom: 36px; }

.page-eyebrow {
    font-size:11px; letter-spacing:4px; text-transform:uppercase;
    color:var(--accent); opacity:.7; margin-bottom:8px;
}

.page-title { font-family:'Graduate',serif; font-size:clamp(28px,5vw,46px); color:var(--light); letter-spacing:2px; }
.page-title span { color:var(--accent); }

/* ── FORM CARD ── */
.form-card {
    background: rgba(57,91,100,.35);
    border: 1px solid rgba(165,201,202,.2);
    border-radius: var(--radius);
    backdrop-filter: blur(8px);
    padding: 40px;
    position: relative; overflow: hidden;
}

.form-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:var(--accent); opacity:.6;
    border-radius:var(--radius) var(--radius) 0 0;
}

/* ── SECCIÓN ── */
.form-section-title {
    font-family:'Graduate',serif; font-size:11px; letter-spacing:3px;
    text-transform:uppercase; color:var(--accent);
    margin-bottom:18px;
    display:flex; align-items:center; gap:12px;
}
.form-section-title::after { content:''; flex:1; height:1px; background:rgba(165,201,202,.2); }

/* ── GRID ── */
.grid { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; margin-bottom:30px; }
.full { grid-column:span 2; }

/* ── CAMPOS ── */
.field-group { display:flex; flex-direction:column; gap:8px; }

label {
    font-size:12px; letter-spacing:2px; text-transform:uppercase;
    color:var(--muted); font-family:'Graduate',serif;
}

input, select, textarea {
    width:100%; padding:14px 16px;
    background:rgba(44,51,51,.7);
    border:1px solid rgba(165,201,202,.25);
    border-radius:9px;
    color:var(--light); font-family:'Barlow',sans-serif; font-size:15px;
    outline:none; transition:border-color .25s, background .25s, box-shadow .25s;
    -webkit-appearance:none;
    appearance:none;
}

input::placeholder, textarea::placeholder { color:rgba(165,201,202,.3); font-size:14px; }

input:focus, select:focus, textarea:focus {
    border-color:var(--accent);
    background:rgba(57,91,100,.55);
    box-shadow:0 0 0 3px rgba(165,201,202,.12);
}

select option { background:#2C3333; color:var(--light); }
textarea { min-height:100px; resize:vertical; }

input[readonly] {
    background:rgba(44,51,51,.4);
    border-color:rgba(165,201,202,.12);
    color:var(--muted); cursor:not-allowed;
}

.field-hint { font-size:11px; color:var(--muted); opacity:.7; margin-top:2px; }

/* ── SUBTOTAL HIGHLIGHT ── */
.subtotal-box {
    background: rgba(165,201,202,.08);
    border: 1px solid rgba(165,201,202,.35) !important;
    color: var(--accent) !important;
    font-weight: 600;
    font-size: 17px !important;
}

/* ── BOTÓN ── */
.btn-submit {
    width:100%; padding:18px;
    background:var(--mid); border:1px solid rgba(165,201,202,.3);
    border-radius:10px; color:var(--light);
    font-family:'Graduate',serif; font-size:16px; letter-spacing:2px;
    cursor:pointer; transition:background .3s, transform .2s, box-shadow .3s;
    margin-top:10px;
}
.btn-submit:hover {
    background:rgba(57,91,100,.9); transform:translateY(-3px);
    box-shadow:0 12px 30px rgba(0,0,0,.3); border-color:var(--accent);
}
.btn-submit:active { transform:translateY(0); }

/* ── RESPONSIVE ── */
@media(max-width:700px) {
    .grid { grid-template-columns:1fr; }
    .full { grid-column:span 1; }
    .form-card { padding:24px 20px; }
    nav { padding:0 20px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="nav-logo">HEBRATECH</div>
    <a href="../index.html" class="nav-back">Volver al menú</a>
</nav>

<!-- CONTENIDO -->
<div class="page">

    <div class="page-header">
        <div class="page-eyebrow">Módulo de inventario</div>
        <h1 class="page-title">ENTRADA DE <span>MATERIALES</span></h1>
    </div>

    <div class="form-card">
    <form id="formMateriales">

        <!-- SECCIÓN 1: IDENTIFICACIÓN -->
        <div class="form-section-title">Identificación</div>
        <div class="grid">

            <div class="field-group">
                <label for="idEntrada">ID Entrada</label>
                <input type="number" id="idEntrada" name="idEntrada" placeholder="Autogenerado" readonly>
            </div>

            <div class="field-group">
                <label for="numeroRemision">N° de Remisión</label>
                <input type="text" id="numeroRemision" name="numeroRemision" placeholder="Ej: REM-2025-001">
            </div>

            <div class="field-group">
                <label for="idProveedor">ID Proveedor</label>
                <input type="number" id="idProveedor" name="idProveedor" placeholder="Ej: 304">
            </div>

            <div class="field-group">
                <label for="idMaterial">ID Material</label>
                <input type="number" id="idMaterial" name="idMaterial" placeholder="Ej: 108">
            </div>

        </div>

        <!-- SECCIÓN 2: CANTIDADES Y COSTOS -->
        <div class="form-section-title">Cantidades y Costos</div>
        <div class="grid">

            <div class="field-group">
                <label for="cantidad">Cantidad</label>
                <input type="number" step="0.01" id="cantidad" name="cantidad" placeholder="0.00" oninput="calcularSubtotal()">
            </div>

            <div class="field-group">
                <label for="unidad">Unidad</label>
                <select id="unidad" name="unidad">
                    <option value="" disabled selected>Seleccionar unidad</option>
                    <option value="metros">Metros</option>
                    <option value="kilogramos">Kilogramos</option>
                    <option value="yardas">Yardas</option>
                    <option value="rollos">Rollos</option>
                    <option value="unidades">Unidades</option>
                    <option value="litros">Litros</option>
                </select>
            </div>

            <div class="field-group">
                <label for="precioUnitario">Precio Unitario (COP)</label>
                <input type="number" step="0.01" id="precioUnitario" name="precioUnitario" placeholder="0.00" oninput="calcularSubtotal()">
            </div>

            <div class="field-group">
                <label for="subtotal">Subtotal (COP)</label>
                <input type="number" step="0.01" id="subtotal" name="subtotal" placeholder="0.00" readonly class="subtotal-box">
                <span class="field-hint">Calculado automáticamente</span>
            </div>

        </div>

        <!-- SECCIÓN 3: FECHAS Y ESTADO -->
        <div class="form-section-title">Fechas y Estado</div>
        <div class="grid">

            <div class="field-group">
                <label for="fechaEntrada">Fecha de Entrada</label>
                <input type="date" id="fechaEntrada" name="fechaEntrada">
            </div>

            <div class="field-group">
                <label for="estado">Estado</label>
                <select id="estado" name="estado">
                    <option value="" disabled selected>Seleccionar estado</option>
                    <option value="recibido">Recibido</option>
                    <option value="pendiente">Pendiente de verificación</option>
                    <option value="rechazado">Rechazado</option>
                    <option value="parcial">Recibido parcial</option>
                </select>
            </div>

            <div class="field-group">
                <label for="fechaRegistro">Fecha de Registro</label>
                <input type="datetime-local" id="fechaRegistro" name="fechaRegistro" readonly>
                <span class="field-hint">Generado automáticamente</span>
            </div>

        </div>

        <!-- SECCIÓN 4: OBSERVACIONES -->
        <div class="form-section-title">Observaciones</div>
        <div class="grid">
            <div class="field-group full">
                <label for="observaciones">Observaciones</label>
                <textarea id="observaciones" name="observaciones" placeholder="Condición del material, novedades en la entrega, control de calidad..."></textarea>
            </div>
        </div>

        <button type="submit" class="btn-submit">GUARDAR ENTRADA</button>

    </form>
    </div>

</div>

<script>
// Auto-fill fecha de registro al cargar
const ahora = new Date();
const pad = n => String(n).padStart(2,'0');
document.getElementById('fechaRegistro').value =
    `${ahora.getFullYear()}-${pad(ahora.getMonth()+1)}-${pad(ahora.getDate())}T${pad(ahora.getHours())}:${pad(ahora.getMinutes())}`;

// Auto-fill fecha entrada con hoy
document.getElementById('fechaEntrada').value =
    `${ahora.getFullYear()}-${pad(ahora.getMonth()+1)}-${pad(ahora.getDate())}`;

// Calcular subtotal automáticamente
function calcularSubtotal() {
    const cant  = parseFloat(document.getElementById('cantidad').value)      || 0;
    const price = parseFloat(document.getElementById('precioUnitario').value) || 0;
    const sub   = (cant * price).toFixed(2);
    document.getElementById('subtotal').value = sub > 0 ? sub : '';
}
</script>

</body>
</html>
