<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producción — Hebratech</title>
<link rel="stylesheet" href="../../css/style-produccion.css">
<link href="https://fonts.googleapis.com/css2?family=Graduate&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="nav-logo">HEBRATECH</div>
    <a href="../Admin.html" class="nav-back">Volver al menú</a>
</nav>

<!-- CONTENIDO -->
<div class="page">

    <div class="page-header">
        <div class="page-eyebrow">Módulo de gestión</div>
        <h1 class="page-title">REGISTRO DE <span>PRODUCCIÓN</span></h1>
    </div>

    <div class="form-card">
    <form>

        <!-- SECCIÓN 1: IDENTIFICACIÓN -->
        <div class="form-section-title">Identificación</div>
        <div class="grid divider">

            <div class="field-group">
                <label for="idProduccion">ID Producción</label>
                <input type="number" id="idProduccion" name="idProduccion" placeholder="Autogenerado" readonly>
            </div>

            <div class="field-group">
                <label for="idOrden">ID Orden</label>
                <input type="number" id="idOrden" name="idOrden" placeholder="Ej: 1042">
            </div>

            <div class="field-group">
                <label for="idProducto">ID Producto</label>
                <input type="number" id="idProducto" name="idProducto" placeholder="Ej: 205">
            </div>

            <div class="field-group">
                <label for="estado">Estado</label>
                <select id="estado" name="estado">
                    <option value="" disabled selected>Seleccionar estado</option>
                    <option value="pendiente">Pendiente</option>
                    <option value="en_proceso">En proceso</option>
                    <option value="pausado">Pausado</option>
                    <option value="finalizado">Finalizado</option>
                    <option value="cancelado">Cancelado</option>
                </select>
            </div>

        </div>

        <!-- SECCIÓN 2: PLANIFICACIÓN -->
        <div class="form-section-title">Planificación</div>
        <div class="grid divider">

            <div class="field-group">
                <label for="cantidadRequerida">Cantidad Requerida</label>
                <input type="number" id="cantidadRequerida" name="cantidadRequerida" placeholder="Unidades">
            </div>

            <div class="field-group">
                <label for="fechaInicio">Fecha de Inicio</label>
                <input type="date" id="fechaInicio" name="fechaInicio">
            </div>

            <div class="field-group">
                <label for="fechaEstimadaFin">Fecha Estimada de Fin</label>
                <input type="date" id="fechaEstimadaFin" name="fechaEstimadaFin">
            </div>

            <div class="field-group">
                <label for="fechaRealFin">Fecha Real de Fin</label>
                <input type="date" id="fechaRealFin" name="fechaRealFin">
            </div>

        </div>

        <!-- SECCIÓN 3: COSTOS -->
        <div class="form-section-title">Costos</div>
        <div class="grid divider">

            <div class="field-group">
                <label for="costoEstimado">Costo Estimado (COP)</label>
                <input type="number" step="0.01" id="costoEstimado" name="costoEstimado" placeholder="0.00">
            </div>

            <div class="field-group">
                <label for="costoReal">Costo Real (COP)</label>
                <input type="number" step="0.01" id="costoReal" name="costoReal" placeholder="0.00">
            </div>

        </div>

        <!-- SECCIÓN 4: DESCRIPCIÓN -->
        <div class="form-section-title">Descripción</div>
        <div class="grid">
            <div class="field-group full">
                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" name="descripcion" placeholder="Detalles del proceso de producción..."></textarea>
            </div>
        </div>

       <a href="../tareas/tareas.html" target="_blank" class="btn-submit" style="text-decoration: none; display: inline-block;">
        GUARDAR PRODUCCIÓN
        </a>

    </form>
    </div>

</div>

</body>
</html>
