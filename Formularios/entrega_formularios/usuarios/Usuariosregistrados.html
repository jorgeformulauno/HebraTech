<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuarios Registrados — Hebratech</title>
<link href="https://fonts.googleapis.com/css2?family=Graduate&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --dark:   #2C3333;
    --mid:    #395B64;
    --accent: #A5C9CA;
    --light:  #E7F6F2;
    --muted:  #7aadb0;
    --radius: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Barlow', sans-serif;
    background: var(--dark);
    color: var(--light);
    min-height: 100vh;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
        radial-gradient(ellipse 70% 50% at 10% 0%,  rgba(165,201,202,.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 90% 95%, rgba(57,91,100,.30)   0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
}

/* ── NAVBAR ── */
nav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 64px;
    background: rgba(44,51,51,.90);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(165,201,202,.2);
}

.nav-logo { font-family: 'Graduate', serif; font-size: 20px; color: var(--accent); letter-spacing: 3px; }
.nav-back { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--muted); font-size: 13px; letter-spacing: 1px; transition: color .2s; }
.nav-back:hover { color: var(--light); }
.nav-back::before { content: '←'; font-size: 16px; }

/* ── PÁGINA ── */
.page { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 50px 30px 80px; }

.page-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 36px; }
.page-eyebrow { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); opacity: .7; margin-bottom: 8px; }
.page-title { font-family: 'Graduate', serif; font-size: clamp(24px, 4vw, 36px); color: var(--light); letter-spacing: 2px; }
.page-title span { color: var(--accent); }

/* ── TABLA ── */
.table-container {
    background: rgba(57,91,100,.35);
    border: 1px solid rgba(165,201,202,.2);
    border-radius: var(--radius);
    backdrop-filter: blur(8px);
    overflow-x: auto;
    position: relative;
}

.table-container::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); opacity: .6; border-radius: var(--radius) var(--radius) 0 0;
}

table { width: 100%; border-collapse: collapse; text-align: left; }

th {
    font-family: 'Graduate', serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
    padding: 24px 20px 16px; border-bottom: 1px solid rgba(165,201,202,.2);
}

td { padding: 16px 20px; border-bottom: 1px solid rgba(165,201,202,.1); font-size: 15px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(165,201,202,.05); }

/* ── ESTADOS ── */
.badge {
    padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
}
.badge.activo { background: rgba(165,201,202,.2); color: var(--accent); border: 1px solid rgba(165,201,202,.4); }
.badge.inactivo { background: rgba(200,100,100,.2); color: #ff9999; border: 1px solid rgba(200,100,100,.4); }

.empty-state { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 16px; font-style: italic; }
</style>
</head>

<body>

<nav>
    <div class="nav-logo">HEBRATECH</div>
    <a href="usuarios.html" class="nav-back">Volver al registro</a>
</nav>

<div class="page">
    <div class="page-header">
        <div>
            <div class="page-eyebrow">Directorio</div>
            <h1 class="page-title">USUARIOS <span>REGISTRADOS</span></h1>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre Completo</th>
                    <th>Rol</th>
                    <th>Correo</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tablaUsuarios">
                </tbody>
        </table>
    </div>
</div>

<script>
    // Se ejecuta al cargar la página
    document.addEventListener('DOMContentLoaded', () => {
        const tbody = document.getElementById('tablaUsuarios');
        
        // Traemos los datos de la memoria
        const usuariosGuardados = JSON.parse(localStorage.getItem('hebratech_usuarios')) || [];

        if (usuariosGuardados.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">No hay usuarios registrados en la base local aún.</div></td></tr>';
            return;
        }

        // Armamos las filas de la tabla
        let filasHTML = '';
        usuariosGuardados.forEach(usuario => {
            const claseEstado = usuario.estado.toLowerCase() === 'activo' ? 'activo' : 'inactivo';
            filasHTML += `
                <tr>
                    <td style="color: var(--muted)">#${usuario.id}</td>
                    <td style="font-weight: 600;">${usuario.nombre}</td>
                    <td>${usuario.rol}</td>
                    <td>${usuario.correo}</td>
                    <td style="color: var(--muted); font-size: 14px;">${usuario.fecha}</td>
                    <td><span class="badge ${claseEstado}">${usuario.estado}</span></td>
                </tr>
            `;
        });

        tbody.innerHTML = filasHTML;
    });
</script>

</body>
</html>
