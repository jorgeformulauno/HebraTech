<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incidencias — Hebratech</title>

<link href="https://fonts.googleapis.com/css2?family=Graduate&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --dark:   #2C3333;
    --mid:    #395B64;
    --accent: #A5C9CA;
    --light:  #E7F6F2;
    --muted:  #7aadb0;
    --radius: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Barlow', sans-serif;
    background: var(--dark);
    color: var(--light);
    min-height: 100vh;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed; inset: 0;
    background:
        radial-gradient(ellipse 70% 50% at 10% 0%,  rgba(165,201,202,.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 90% 95%, rgba(57,91,100,.30)   0%, transparent 55%);
    pointer-events: none; z-index: 0;
}

/* ── NAVBAR ── */
nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 64px;
    background: rgba(44,51,51,.90);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(165,201,202,.2);
}

.nav-logo { font-family:'Graduate',serif; font-size:20px; color:var(--accent); letter-spacing:3px; }

.nav-back {
    display:flex; align-items:center; gap:8px;
    text-decoration:none; color:var(--muted); font-size:13px; letter-spacing:1px;
    transition:color .2s;
}
.nav-back:hover { color:var(--light); }
.nav-back::before { content:'←'; font-size:16px; }

/* ── PÁGINA ── */
.page {
    position: relative; z-index: 1;
    max-width: 900px; margin: 0 auto;
    padding: 50px 30px 80px;
    animation: fadeUp .5s ease both;
}

@keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
}

.page-header { margin-bottom: 36px; }

.page-eyebrow {
    font-size:11px; letter-spacing:4px; text-transform:uppercase;
    color:var(--accent); opacity:.7; margin-bottom:8px;
}

.page-title { font-family:'Graduate',serif; font-size:clamp(28px,5vw,46px); color:var(--light); letter-spacing:2px; }
.page-title span { color:#e05a5a; }

/* ── FORM CARD ── */
.form-card {
    background: rgba(57,91,100,.35);
    border: 1px solid rgba(165,201,202,.2);
    border-radius: var(--radius);
    backdrop-filter: blur(8px);
    padding: 40px;
    position: relative; overflow: hidden;
}

.form-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background: #e05a5a; opacity:.7;
    border-radius:var(--radius) var(--radius) 0 0;
}

/* ── SECCIÓN ── */
.form-section-title {
    font-family:'Graduate',serif; font-size:11px; letter-spacing:3px;
    text-transform:uppercase; color:var(--accent);
    margin-bottom:18px;
    display:flex; align-items:center; gap:12px;
}
.form-section-title::after { content:''; flex:1; height:1px; background:rgba(165,201,202,.2); }

/* ── GRID ── */
.grid { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; margin-bottom:30px; }
.full { grid-column:span 2; }

/* ── CAMPOS ── */
.field-group { display:flex; flex-direction:column; gap:8px; }

label {
    font-size:12px; letter-spacing:2px; text-transform:uppercase;
    color:var(--muted); font-family:'Graduate',serif;
}

input, select, textarea {
    width:100%; padding:14px 16px;
    background:rgba(44,51,51,.7);
    border:1px solid rgba(165,201,202,.25);
    border-radius:9px;
    color:var(--light); font-family:'Barlow',sans-serif; font-size:15px;
    outline:none; transition:border-color .25s, background .25s, box-shadow .25s;
    appearance:none;
    -webkit-appearance:none;
}

input::placeholder, textarea::placeholder { color:rgba(165,201,202,.3); font-size:14px; }

input:focus, select:focus, textarea:focus {
    border-color:var(--accent);
    background:rgba(57,91,100,.55);
    box-shadow:0 0 0 3px rgba(165,201,202,.12);
}

select option { background:#2C3333; color:var(--light); }
textarea { min-height:110px; resize:vertical; }

input[readonly] {
    background:rgba(44,51,51,.4);
    border-color:rgba(165,201,202,.12);
    color:var(--muted); cursor:not-allowed;
}

/* ── TIPO DE INCIDENCIA (selector visual) ── */
.tipo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    grid-column: span 2;
}

.tipo-radio { display:none; }

.tipo-label {
    display:flex; flex-direction:column; align-items:center; gap:6px;
    padding:14px 8px;
    border:1px solid rgba(165,201,202,.2); border-radius:10px;
    background:rgba(44,51,51,.6); cursor:pointer;
    font-family:'Graduate',serif; font-size:10px; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--muted);
    transition:all .2s; text-align:center;
}
.tipo-label .ico { font-size:22px; }

.tipo-radio:checked + .tipo-label {
    background:rgba(57,91,100,.6);
    color:var(--light);
    border-color:#e05a5a;
    box-shadow:0 0 0 2px rgba(224,90,90,.15);
}

/* ── ESTADO SELECTOR ── */
.estado-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    grid-column: span 2;
}

.estado-radio { display:none; }

.estado-label {
    display:flex; flex-direction:column; align-items:center; gap:6px;
    padding:12px 8px;
    border:1px solid rgba(165,201,202,.2); border-radius:10px;
    background:rgba(44,51,51,.6); cursor:pointer;
    font-family:'Graduate',serif; font-size:10px; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--muted);
    transition:all .2s; text-align:center;
}
.estado-label .ico { font-size:18px; }

#e-activo:checked    + .estado-label { border-color:#e05a5a; color:#e05a5a; background:rgba(224,90,90,.1); box-shadow:0 0 0 2px rgba(224,90,90,.1); }
#e-revision:checked  + .estado-label { border-color:#c9a84c; color:#c9a84c; background:rgba(201,168,76,.1); box-shadow:0 0 0 2px rgba(201,168,76,.1); }
#e-resuelto:checked  + .estado-label { border-color:#3ddc84; color:#3ddc84; background:rgba(61,220,132,.1); box-shadow:0 0 0 2px rgba(61,220,132,.1); }

/* ── BOTÓN ── */
.btn-submit {
    width:100%; padding:18px;
    background:var(--mid); border:1px solid rgba(165,201,202,.3);
    border-radius:10px; color:var(--light);
    font-family:'Graduate',serif; font-size:16px; letter-spacing:2px;
    cursor:pointer; transition:background .3s, transform .2s, box-shadow .3s;
    margin-top:10px;
}
.btn-submit:hover {
    background:rgba(57,91,100,.9); transform:translateY(-3px);
    box-shadow:0 12px 30px rgba(0,0,0,.3); border-color:#e05a5a;
}
.btn-submit:active { transform:translateY(0); }

/* ── RESPONSIVE ── */
@media(max-width:700px) {
    .grid { grid-template-columns:1fr; }
    .full { grid-column:span 1; }
    .tipo-grid, .estado-grid { grid-template-columns:1fr; grid-column:span 1; }
    .form-card { padding:24px 20px; }
    nav { padding:0 20px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="nav-logo">HEBRATECH</div>
    <a href="../index.html" class="nav-back">Volver al menú</a>
</nav>

<!-- CONTENIDO -->
<div class="page">

    <div class="page-header">
        <div class="page-eyebrow">Módulo de seguimiento</div>
        <h1 class="page-title">REGISTRO DE <span>INCIDENCIAS</span></h1>
    </div>

    <div class="form-card">
    <form action="procesar_incidencia.php" method="POST">

        <!-- SECCIÓN 1: IDENTIFICACIÓN -->
        <div class="form-section-title">Identificación</div>
        <div class="grid">

            <div class="field-group">
                <label for="idIncidencia">ID Incidencia</label>
                <input type="number" id="idIncidencia" name="idIncidencia" placeholder="Autogenerado" readonly>
            </div>

            <div class="field-group">
                <label for="idOperario">ID Operario</label>
                <input type="number" id="idOperario" name="idOperario" placeholder="Ej: 205" required>
            </div>

            <div class="field-group">
                <label for="periodoEvaluado">Periodo Evaluado</label>
                <input type="text" id="periodoEvaluado" name="periodoEvaluado" placeholder="Ej: Abril 2025 / Semana 14">
            </div>

        </div>

        <!-- SECCIÓN 2: TIPO DE INCIDENCIA -->
        <div class="form-section-title">Tipo de Incidencia</div>
        <div class="grid" style="margin-bottom:30px;">
            <div class="tipo-grid">

                <div>
                    <input type="radio" name="tipoIncidencia" id="t-falla"    value="Falla de equipo"    class="tipo-radio">
                    <label for="t-falla"    class="tipo-label"><span class="ico">⚙️</span>Falla de equipo</label>
                </div>
                <div>
                    <input type="radio" name="tipoIncidencia" id="t-calidad"  value="Calidad"            class="tipo-radio">
                    <label for="t-calidad"  class="tipo-label"><span class="ico">🔍</span>Calidad</label>
                </div>
                <div>
                    <input type="radio" name="tipoIncidencia" id="t-seguridad" value="Seguridad"         class="tipo-radio">
                    <label for="t-seguridad" class="tipo-label"><span class="ico">🦺</span>Seguridad</label>
                </div>
                <div>
                    <input type="radio" name="tipoIncidencia" id="t-materia"  value="Materia prima"      class="tipo-radio">
                    <label for="t-materia"  class="tipo-label"><span class="ico">🧵</span>Materia prima</label>
                </div>
                <div>
                    <input type="radio" name="tipoIncidencia" id="t-proceso"  value="Proceso"            class="tipo-radio">
                    <label for="t-proceso"  class="tipo-label"><span class="ico">🔄</span>Proceso</label>
                </div>
                <div>
                    <input type="radio" name="tipoIncidencia" id="t-otro"     value="Otro"               class="tipo-radio">
                    <label for="t-otro"     class="tipo-label"><span class="ico">📋</span>Otro</label>
                </div>

            </div>
        </div>

        <!-- SECCIÓN 3: ESTADO -->
        <div class="form-section-title">Estado</div>
        <div class="grid" style="margin-bottom:30px;">
            <div class="estado-grid">

                <div>
                    <input type="radio" name="estado" id="e-activo"   value="Activo"      class="estado-radio" checked>
                    <label for="e-activo"   class="estado-label"><span class="ico">🔴</span>Activo</label>
                </div>
                <div>
                    <input type="radio" name="estado" id="e-revision" value="En revisión" class="estado-radio">
                    <label for="e-revision" class="estado-label"><span class="ico">🟡</span>En revisión</label>
                </div>
                <div>
                    <input type="radio" name="estado" id="e-resuelto" value="Resuelto"    class="estado-radio">
                    <label for="e-resuelto" class="estado-label"><span class="ico">🟢</span>Resuelto</label>
                </div>

            </div>
        </div>

        <!-- SECCIÓN 4: FECHAS -->
        <div class="form-section-title">Fechas</div>
        <div class="grid">

            <div class="field-group">
                <label for="fechaGeneracion">Fecha de Generación</label>
                <input type="date" id="fechaGeneracion" name="fechaGeneracion">
            </div>

            <div class="field-group">
                <label for="fechaRevision">Fecha de Revisión</label>
                <input type="date" id="fechaRevision" name="fechaRevision">
            </div>

        </div>

        <!-- SECCIÓN 5: DESCRIPCIÓN -->
        <div class="form-section-title">Descripción</div>
        <div class="grid">
            <div class="field-group full">
                <label for="descripcion">Descripción de la Incidencia</label>
                <textarea id="descripcion" name="descripcion" placeholder="Detalle qué ocurrió, cómo se detectó, área afectada, posible causa..."></textarea>
            </div>
        </div>

        <button type="submit" class="btn-submit">GUARDAR INCIDENCIA</button>

    </form>
    </div>

</div>

<script>
const hoy = new Date();
const pad = n => String(n).padStart(2,'0');
document.getElementById('fechaGeneracion').value =
    `${hoy.getFullYear()}-${pad(hoy.getMonth()+1)}-${pad(hoy.getDate())}`;
</script>

</body>
</html>
