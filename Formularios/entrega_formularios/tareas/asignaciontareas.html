<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asignación de Tareas — Hebratech</title>
<link href="https://fonts.googleapis.com/css2?family=Graduate&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
    --dark:   #2C3333;
    --mid:    #395B64;
    --accent: #A5C9CA;
    --light:  #E7F6F2;
    --muted:  #7aadb0;
    --radius: 12px;

    --col-pendiente: #c9a84c;
    --col-proceso:   #17a9c8;
    --col-revision:  #b07ef0;
    --col-finalizado:#3ddc84;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Barlow', sans-serif;
    background: var(--dark);
    color: var(--light);
    min-height: 100vh;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed; inset: 0;
    background:
        radial-gradient(ellipse 70% 50% at 5%  0%,  rgba(165,201,202,.09) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 95% 100%, rgba(57,91,100,.28) 0%, transparent 55%);
    pointer-events: none; z-index: 0;
}

/* ── NAVBAR ── */
nav {
    position: sticky; top: 0; z-index: 200;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 62px;
    background: rgba(44,51,51,.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(165,201,202,.18);
}

.nav-logo { font-family:'Graduate',serif; font-size:18px; color:var(--accent); letter-spacing:3px; }

.nav-right { display:flex; align-items:center; gap:20px; }

.nav-back {
    display:flex; align-items:center; gap:6px;
    text-decoration:none; color:var(--muted); font-size:13px; letter-spacing:1px;
    transition:color .2s;
}
.nav-back:hover { color:var(--light); }
.nav-back::before { content:'←'; font-size:15px; }

.btn-nueva {
    display:flex; align-items:center; gap:7px;
    padding:9px 18px;
    background: var(--mid);
    border: 1px solid rgba(165,201,202,.3);
    border-radius: 8px;
    color: var(--light);
    font-family:'Graduate',serif; font-size:11px; letter-spacing:2px;
    cursor:pointer; transition: all .2s;
}
.btn-nueva:hover { background:rgba(57,91,100,.9); border-color:var(--accent); transform:translateY(-1px); }
.btn-nueva span { font-size:16px; }

/* ── HEADER ── */
.page-header {
    position:relative; z-index:1;
    padding: 38px 32px 24px;
    display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:16px;
    animation: fadeUp .5s ease both;
}

.header-left .eyebrow { font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--accent); opacity:.7; margin-bottom:6px; }
.header-left h1 { font-family:'Graduate',serif; font-size:clamp(24px,4vw,40px); letter-spacing:2px; }
.header-left h1 span { color:var(--accent); }

.board-stats { display:flex; gap:12px; flex-wrap:wrap; }

.bstat {
    padding:8px 16px;
    background:rgba(57,91,100,.35);
    border:1px solid rgba(165,201,202,.15);
    border-radius:8px;
    font-size:12px; letter-spacing:1px;
    display:flex; align-items:center; gap:8px;
}
.bstat-dot { width:8px; height:8px; border-radius:50%; }

/* ── BOARD ── */
.board-wrap {
    position:relative; z-index:1;
    padding: 0 32px 60px;
    animation: fadeUp .5s .1s ease both;
}

.board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    align-items: start;
}

/* ── COLUMNA ── */
.column {
    background: rgba(57,91,100,.22);
    border: 1px solid rgba(165,201,202,.13);
    border-radius: var(--radius);
    overflow: hidden;
    min-height: 300px;
    transition: background .2s;
}

.column.drag-over { background: rgba(165,201,202,.1); border-color: var(--accent); }

.col-header {
    padding: 14px 16px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom: 1px solid rgba(165,201,202,.1);
}

.col-title {
    display:flex; align-items:center; gap:9px;
    font-family:'Graduate',serif; font-size:11px; letter-spacing:2px; text-transform:uppercase;
}

.col-bar {
    width: 10px; height: 10px; border-radius: 3px;
}

.col-count {
    font-size:11px; padding:2px 9px;
    border-radius:20px;
    background:rgba(165,201,202,.12);
    color:var(--muted);
    font-family:'Graduate',serif;
}

.col-body {
    padding: 12px;
    display:flex; flex-direction:column; gap:10px;
    min-height: 200px;
}

/* ── CARD ── */
.task-card {
    background: rgba(44,51,51,.75);
    border: 1px solid rgba(165,201,202,.15);
    border-radius: 10px;
    padding: 14px;
    cursor: grab;
    transition: transform .2s, box-shadow .2s, border-color .2s;
    position: relative;
    overflow: hidden;
    animation: cardIn .3s ease both;
}

@keyframes cardIn {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
}

.task-card:active { cursor: grabbing; }
.task-card:hover { transform:translateY(-3px); box-shadow:0 10px 28px rgba(0,0,0,.3); border-color:rgba(165,201,202,.3); }
.task-card.dragging { opacity:.4; transform:scale(.97); }

.card-priority-bar {
    position:absolute; top:0; left:0; right:0; height:3px; border-radius:10px 10px 0 0;
}

.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; margin-top:4px; }

.card-id { font-size:10px; letter-spacing:2px; color:var(--muted); font-family:'Graduate',serif; }

.card-priority-badge {
    font-size:9px; letter-spacing:1.5px; padding:3px 8px; border-radius:20px;
    font-family:'Graduate',serif; text-transform:uppercase;
    border: 1px solid;
}

.card-title { font-size:13px; font-weight:600; color:var(--light); margin-bottom:6px; line-height:1.4; }
.card-desc { font-size:12px; color:var(--muted); line-height:1.5; margin-bottom:10px; }

.card-meta { display:flex; flex-wrap:wrap; gap:6px; }
.meta-chip {
    font-size:10px; padding:3px 9px; border-radius:20px;
    background:rgba(165,201,202,.1); color:var(--muted);
    display:flex; align-items:center; gap:4px;
}

.card-footer {
    display:flex; justify-content:space-between; align-items:center;
    margin-top:10px; padding-top:10px;
    border-top:1px solid rgba(165,201,202,.1);
    font-size:11px; color:var(--muted);
}

.card-hours { display:flex; align-items:center; gap:5px; }
.hours-bar { width:60px; height:4px; background:rgba(165,201,202,.15); border-radius:2px; overflow:hidden; }
.hours-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .4s; }

.card-actions { display:flex; gap:6px; }
.card-btn {
    background:rgba(165,201,202,.1); border:none; border-radius:6px;
    color:var(--muted); font-size:12px; padding:4px 8px; cursor:pointer;
    transition:all .15s;
}
.card-btn:hover { background:rgba(165,201,202,.2); color:var(--light); }

/* ── MODAL ── */
.modal-overlay {
    position:fixed; inset:0; z-index:500;
    background:rgba(7,18,20,.75);
    backdrop-filter:blur(5px);
    display:flex; align-items:center; justify-content:center;
    padding:20px;
    opacity:0; pointer-events:none;
    transition:opacity .25s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }

.modal {
    background: #2a3c42;
    border: 1px solid rgba(165,201,202,.22);
    border-radius: 16px;
    width: 100%; max-width: 620px;
    max-height: 90vh; overflow-y:auto;
    padding: 36px;
    position:relative;
    transform:translateY(20px); transition:transform .25s;
}
.modal-overlay.open .modal { transform:translateY(0); }

.modal::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:var(--accent); opacity:.7;
    border-radius:16px 16px 0 0;
}

.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
.modal-title { font-family:'Graduate',serif; font-size:18px; letter-spacing:2px; }
.modal-title span { color:var(--accent); }

.modal-close {
    background:rgba(165,201,202,.1); border:none; border-radius:8px;
    color:var(--muted); font-size:18px; width:34px; height:34px;
    cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center;
}
.modal-close:hover { background:rgba(165,201,202,.2); color:var(--light); }

.modal-section-title {
    font-family:'Graduate',serif; font-size:10px; letter-spacing:3px;
    text-transform:uppercase; color:var(--accent);
    margin-bottom:14px;
    display:flex; align-items:center; gap:10px;
}
.modal-section-title::after { content:''; flex:1; height:1px; background:rgba(165,201,202,.15); }

.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:22px; }
.form-grid .full { grid-column:span 2; }

.field { display:flex; flex-direction:column; gap:7px; }

.field label {
    font-family:'Graduate',serif; font-size:10px;
    letter-spacing:2px; text-transform:uppercase; color:var(--muted);
}

.field input, .field select, .field textarea {
    padding:12px 14px;
    background:rgba(44,51,51,.8);
    border:1px solid rgba(165,201,202,.2);
    border-radius:8px;
    color:var(--light); font-family:'Barlow',sans-serif; font-size:14px;
    outline:none; transition:border-color .2s, box-shadow .2s;
    appearance:none;
    -webkit-appearance:none;
}
.field input::placeholder, .field textarea::placeholder { color:rgba(165,201,202,.3); }
.field input:focus, .field select:focus, .field textarea:focus {
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(165,201,202,.1);
}
.field select option { background:#2C3333; }
.field textarea { min-height:80px; resize:vertical; }

/* Prioridad selector */
.priority-selector { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.prio-radio { display:none; }
.prio-label {
    display:flex; flex-direction:column; align-items:center; gap:5px;
    padding:12px; border:1px solid rgba(165,201,202,.2); border-radius:9px;
    background:rgba(44,51,51,.6); cursor:pointer; font-family:'Graduate',serif;
    font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted);
    transition:all .2s; text-align:center;
}
.prio-label .pico { font-size:20px; }
.prio-radio:checked + .prio-label { background:rgba(57,91,100,.6); color:var(--light); }
#p-baja:checked   + .prio-label { border-color:#3ddc84; box-shadow:0 0 0 2px rgba(61,220,132,.15); }
#p-media:checked  + .prio-label { border-color:#c9a84c; box-shadow:0 0 0 2px rgba(201,168,76,.15); }
#p-alta:checked   + .prio-label { border-color:#e05a5a; box-shadow:0 0 0 2px rgba(224,90,90,.15); }

.btn-guardar {
    width:100%; padding:16px;
    background:var(--mid); border:1px solid rgba(165,201,202,.3);
    border-radius:10px; color:var(--light);
    font-family:'Graduate',serif; font-size:14px; letter-spacing:2px;
    cursor:pointer; transition:all .25s; margin-top:8px;
}
.btn-guardar:hover { background:rgba(57,91,100,.9); border-color:var(--accent); transform:translateY(-2px); box-shadow:0 10px 25px rgba(0,0,0,.3); }

/* empty state */
.empty-state {
    text-align:center; padding:30px 10px;
    color:rgba(165,201,202,.25);
    font-size:12px; letter-spacing:1.5px;
    font-family:'Graduate',serif; text-transform:uppercase;
}
.empty-state .ico { font-size:28px; margin-bottom:8px; opacity:.4; }

@keyframes fadeUp {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0); }
}

@media(max-width:900px) {
    .board { grid-template-columns:repeat(2,1fr); }
}
@media(max-width:600px) {
    .board { grid-template-columns:1fr; }
    .board-wrap { padding:0 16px 50px; }
    .page-header { padding:28px 16px 18px; }
    nav { padding:0 16px; }
    .modal { padding:24px 18px; }
    .form-grid { grid-template-columns:1fr; }
    .form-grid .full { grid-column:span 1; }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav>
    <div class="nav-logo">HEBRATECH</div>
    <div class="nav-right">
        <button class="btn-nueva" onclick="abrirModal()">
            <span>＋</span> Nueva asignación
        </button>
        <a href="../index.html" class="nav-back">Menú</a>
    </div>
</nav>

<!-- HEADER -->
<div class="page-header">
    <div class="header-left">
        <div class="eyebrow">Módulo de gestión</div>
        <h1>TABLERO DE <span>ASIGNACIONES</span></h1>
    </div>
    <div class="board-stats">
        <div class="bstat"><div class="bstat-dot" style="background:var(--col-pendiente)"></div> <span id="cnt-pendiente">0</span> Pendientes</div>
        <div class="bstat"><div class="bstat-dot" style="background:var(--col-proceso)"></div>   <span id="cnt-proceso">0</span> En proceso</div>
        <div class="bstat"><div class="bstat-dot" style="background:var(--col-revision)"></div>  <span id="cnt-revision">0</span> Revisión</div>
        <div class="bstat"><div class="bstat-dot" style="background:var(--col-finalizado)"></div><span id="cnt-finalizado">0</span> Finalizadas</div>
    </div>
</div>

<!-- BOARD -->
<div class="board-wrap">
<div class="board" id="board">

    <div class="column" id="col-pendiente" ondragover="onDragOver(event)" ondrop="onDrop(event,'pendiente')" ondragleave="onDragLeave(event)">
        <div class="col-header">
            <div class="col-title">
                <div class="col-bar" style="background:var(--col-pendiente)"></div>
                Pendiente
            </div>
            <span class="col-count" id="badge-pendiente">0</span>
        </div>
        <div class="col-body" id="body-pendiente"></div>
    </div>

    <div class="column" id="col-proceso" ondragover="onDragOver(event)" ondrop="onDrop(event,'proceso')" ondragleave="onDragLeave(event)">
        <div class="col-header">
            <div class="col-title">
                <div class="col-bar" style="background:var(--col-proceso)"></div>
                En Proceso
            </div>
            <span class="col-count" id="badge-proceso">0</span>
        </div>
        <div class="col-body" id="body-proceso"></div>
    </div>

    <div class="column" id="col-revision" ondragover="onDragOver(event)" ondrop="onDrop(event,'revision')" ondragleave="onDragLeave(event)">
        <div class="col-header">
            <div class="col-title">
                <div class="col-bar" style="background:var(--col-revision)"></div>
                Revisión
            </div>
            <span class="col-count" id="badge-revision">0</span>
        </div>
        <div class="col-body" id="body-revision"></div>
    </div>

    <div class="column" id="col-finalizado" ondragover="onDragOver(event)" ondrop="onDrop(event,'finalizado')" ondragleave="onDragLeave(event)">
        <div class="col-header">
            <div class="col-title">
                <div class="col-bar" style="background:var(--col-finalizado)"></div>
                Finalizado
            </div>
            <span class="col-count" id="badge-finalizado">0</span>
        </div>
        <div class="col-body" id="body-finalizado"></div>
    </div>

</div>
</div>

<!-- MODAL NUEVA ASIGNACIÓN -->
<div class="modal-overlay" id="modal" onclick="cerrarModalFuera(event)">
<div class="modal">
    <div class="modal-header">
        <div class="modal-title">NUEVA <span>ASIGNACIÓN</span></div>
        <button class="modal-close" onclick="cerrarModal()">✕</button>
    </div>

    <div class="modal-section-title">Identificación</div>
    <div class="form-grid">
        <div class="field">
            <label>ID Tarea</label>
            <input type="number" id="f-idTarea" placeholder="Ej: 1042">
        </div>
        <div class="field">
            <label>ID Operario</label>
            <input type="number" id="f-idOperario" placeholder="Ej: 205">
        </div>
        <div class="field full">
            <label>Nombre de la tarea</label>
            <input type="text" id="f-nombre" placeholder="Ej: Corte de tela lote #5">
        </div>
    </div>

    <div class="modal-section-title">Planificación</div>
    <div class="form-grid">
        <div class="field">
            <label>Fecha Asignación</label>
            <input type="date" id="f-fechaAsignacion">
        </div>
        <div class="field">
            <label>Fecha Inicio</label>
            <input type="date" id="f-fechaInicio">
        </div>
        <div class="field">
            <label>Fecha Finalización</label>
            <input type="date" id="f-fechaFin">
        </div>
        <div class="field">
            <label>Estado</label>
            <select id="f-estado">
                <option value="pendiente">Pendiente</option>
                <option value="proceso">En Proceso</option>
                <option value="revision">Revisión</option>
                <option value="finalizado">Finalizado</option>
            </select>
        </div>
        <div class="field">
            <label>Horas Estimadas</label>
            <input type="number" step="0.01" id="f-hEst" placeholder="0.00">
        </div>
        <div class="field">
            <label>Horas Reales</label>
            <input type="number" step="0.01" id="f-hReal" placeholder="0.00">
        </div>
    </div>

    <div class="modal-section-title">Prioridad</div>
    <div class="priority-selector" style="margin-bottom:22px;">
        <div>
            <input type="radio" name="prioridad" id="p-baja"  value="baja"  class="prio-radio" checked>
            <label for="p-baja"  class="prio-label"><span class="pico">🟢</span>Baja</label>
        </div>
        <div>
            <input type="radio" name="prioridad" id="p-media" value="media" class="prio-radio">
            <label for="p-media" class="prio-label"><span class="pico">🟡</span>Media</label>
        </div>
        <div>
            <input type="radio" name="prioridad" id="p-alta"  value="alta"  class="prio-radio">
            <label for="p-alta"  class="prio-label"><span class="pico">🔴</span>Alta</label>
        </div>
    </div>

    <div class="modal-section-title">Descripción</div>
    <div style="margin-bottom:22px;">
        <div class="field">
            <label>Descripción</label>
            <textarea id="f-desc" placeholder="Instrucciones, materiales, detalles del trabajo..."></textarea>
        </div>
    </div>

    <button class="btn-guardar" onclick="guardarAsignacion()">GUARDAR ASIGNACIÓN</button>
</div>
</div>

<script>
// ── ESTADO ──
let tareas = [];
let idCounter = 1;
let dragId = null;

const PRIORIDAD_CONFIG = {
    baja:  { color:'#3ddc84', label:'Baja',  badge:'rgba(61,220,132,.15)',  text:'#3ddc84' },
    media: { color:'#c9a84c', label:'Media', badge:'rgba(201,168,76,.15)', text:'#c9a84c' },
    alta:  { color:'#e05a5a', label:'Alta',  badge:'rgba(224,90,90,.15)',  text:'#e05a5a' },
};

const ESTADO_COLS = { pendiente:'pendiente', proceso:'proceso', revision:'revision', finalizado:'finalizado' };

// ── DEMO DATA ──
const demoData = [
    { id:1, idTarea:101, idOperario:12, nombre:'Corte de tela lote #7', descripcion:'Cortar piezas según plantilla A4. Revisar márgenes de costura.', fechaAsignacion:'2025-04-01', fechaInicio:'2025-04-02', fechaFin:'2025-04-05', estado:'proceso', prioridad:'alta', hEst:8, hReal:5 },
    { id:2, idTarea:102, idOperario:9,  nombre:'Revisión de costuras',   descripcion:'Verificar calidad de uniones en lote #6.', fechaAsignacion:'2025-04-02', fechaInicio:'2025-04-03', fechaFin:'2025-04-06', estado:'pendiente', prioridad:'media', hEst:4, hReal:0 },
    { id:3, idTarea:103, idOperario:15, nombre:'Tintura azul marino',     descripcion:'Aplicar tinte en lote #5 según ficha técnica.', fechaAsignacion:'2025-04-01', fechaInicio:'2025-04-01', fechaFin:'2025-04-03', estado:'finalizado', prioridad:'baja', hEst:6, hReal:6.5 },
    { id:4, idTarea:104, idOperario:11, nombre:'Empaque y etiquetado',    descripcion:'Empacar pedido #88 con etiquetas nuevas.', fechaAsignacion:'2025-04-03', fechaInicio:'2025-04-04', fechaFin:'2025-04-07', estado:'revision', prioridad:'media', hEst:3, hReal:2 },
    { id:5, idTarea:105, idOperario:8,  nombre:'Control de calidad',      descripcion:'Inspección final antes de despacho.', fechaAsignacion:'2025-04-04', fechaInicio:'2025-04-05', fechaFin:'2025-04-08', estado:'pendiente', prioridad:'alta', hEst:5, hReal:0 },
];

demoData.forEach(t => { tareas.push(t); idCounter = Math.max(idCounter, t.id + 1); });

// ── RENDER ──
function renderBoard() {
    ['pendiente','proceso','revision','finalizado'].forEach(col => {
        const body = document.getElementById('body-' + col);
        const items = tareas.filter(t => t.estado === col);
        body.innerHTML = '';
        if (!items.length) {
            body.innerHTML = `<div class="empty-state"><div class="ico">📋</div>Sin tareas</div>`;
        } else {
            items.forEach(t => body.appendChild(crearCard(t)));
        }
        document.getElementById('badge-' + col).textContent = items.length;
        document.getElementById('cnt-' + col).textContent = items.length;
    });
}

function crearCard(t) {
    const pc = PRIORIDAD_CONFIG[t.prioridad] || PRIORIDAD_CONFIG.baja;
    const pct = t.hEst > 0 ? Math.min(100, Math.round((t.hReal / t.hEst) * 100)) : 0;

    const card = document.createElement('div');
    card.className = 'task-card';
    card.draggable = true;
    card.dataset.id = t.id;

    card.innerHTML = `
        <div class="card-priority-bar" style="background:${pc.color}"></div>
        <div class="card-top">
            <span class="card-id">#${String(t.id).padStart(4,'0')} · T${t.idTarea} · Op.${t.idOperario}</span>
            <span class="card-priority-badge" style="color:${pc.text};border-color:${pc.text};background:${pc.badge}">${pc.label}</span>
        </div>
        <div class="card-title">${t.nombre}</div>
        ${t.descripcion ? `<div class="card-desc">${t.descripcion}</div>` : ''}
        <div class="card-meta">
            ${t.fechaInicio    ? `<span class="meta-chip">📅 ${t.fechaInicio}</span>` : ''}
            ${t.fechaFin       ? `<span class="meta-chip">🏁 ${t.fechaFin}</span>` : ''}
        </div>
        <div class="card-footer">
            <div class="card-hours">
                <span style="font-size:10px;letter-spacing:1px;">${t.hReal}h / ${t.hEst}h</span>
                <div class="hours-bar"><div class="hours-fill" style="width:${pct}%"></div></div>
            </div>
            <div class="card-actions">
                <button class="card-btn" onclick="moverCard(${t.id},-1)" title="Retroceder">←</button>
                <button class="card-btn" onclick="moverCard(${t.id}, 1)" title="Avanzar">→</button>
                <button class="card-btn" onclick="eliminarCard(${t.id})" title="Eliminar">✕</button>
            </div>
        </div>
    `;

    card.addEventListener('dragstart', e => { dragId = t.id; card.classList.add('dragging'); });
    card.addEventListener('dragend',   e => { dragId = null; card.classList.remove('dragging'); });

    return card;
}

// ── MOVER ──
const ORDEN_COLS = ['pendiente','proceso','revision','finalizado'];

function moverCard(id, dir) {
    const t = tareas.find(x => x.id === id);
    if (!t) return;
    const idx = ORDEN_COLS.indexOf(t.estado);
    const next = ORDEN_COLS[idx + dir];
    if (next) { t.estado = next; renderBoard(); }
}

function eliminarCard(id) {
    tareas = tareas.filter(x => x.id !== id);
    renderBoard();
}

// ── DRAG & DROP ──
function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

function onDrop(e, estado) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    if (dragId !== null) {
        const t = tareas.find(x => x.id === dragId);
        if (t) { t.estado = estado; renderBoard(); }
    }
}

// ── MODAL ──
function abrirModal() {
    // Set today's date
    const hoy = new Date().toISOString().split('T')[0];
    document.getElementById('f-fechaAsignacion').value = hoy;
    document.getElementById('modal').classList.add('open');
}

function cerrarModal() { document.getElementById('modal').classList.remove('open'); }

function cerrarModalFuera(e) { if (e.target.id === 'modal') cerrarModal(); }

function guardarAsignacion() {
    const nombre = document.getElementById('f-nombre').value.trim();
    if (!nombre) { alert('El nombre de la tarea es obligatorio.'); return; }

    const prioridad = document.querySelector('input[name="prioridad"]:checked')?.value || 'baja';

    tareas.push({
        id:              idCounter++,
        idTarea:         parseInt(document.getElementById('f-idTarea').value)    || 0,
        idOperario:      parseInt(document.getElementById('f-idOperario').value) || 0,
        nombre,
        descripcion:     document.getElementById('f-desc').value.trim(),
        fechaAsignacion: document.getElementById('f-fechaAsignacion').value,
        fechaInicio:     document.getElementById('f-fechaInicio').value,
        fechaFin:        document.getElementById('f-fechaFin').value,
        estado:          document.getElementById('f-estado').value,
        prioridad,
        hEst:            parseFloat(document.getElementById('f-hEst').value)  || 0,
        hReal:           parseFloat(document.getElementById('f-hReal').value) || 0,
    });

    // reset
    ['f-idTarea','f-idOperario','f-nombre','f-desc','f-fechaInicio','f-fechaFin','f-hEst','f-hReal'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-estado').value = 'pendiente';
    document.querySelector('#p-baja').checked = true;

    cerrarModal();
    renderBoard();
}

// ── INIT ──
renderBoard();
</script>
