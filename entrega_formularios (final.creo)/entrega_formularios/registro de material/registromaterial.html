<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Materiales - Hebratech</title>
    
    <link href="('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap')" rel="stylesheet">

    <style>
        * {
            font-family: 'Graduate', serif;
            box-sizing: border-box;
        }

        body {
            background: #f2f2f2;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }

        .container {
            width: 450px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 5px solid #01638a;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: #01638a;
            font-size: 1.5rem;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            font-size: 0.85rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        /* Fila para campos pequeños */
        .row {
            display: flex;
            gap: 10px;
        }
        .row div {
            flex: 1;
        }

        button {
            width: 100%;
            margin-top: 25px;
            background-color: #01638a;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }

        button:hover {
            background-color: #3498db;
        }

        .volver-link {
            display: block;
            text-align: center;
            text-decoration: none;
            color: #01638a;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2> MATERIALES</h2>

        <form action="procesar_material.php" method="post">
            
            <label>Nombre del material:</label>
            <input type="text" name="nombreMaterial" placeholder="Ej: Tela de Algodón" required>

            <label>Descripción:</label>
            <textarea name="descripcion" rows="2" placeholder="Detalles técnicos del material..."></textarea>

            <div class="row">
                <div>
                    <label>Stock Actual:</label>
                    <input type="number" name="stockActual" step="0.01" min="0" required>
                </div>
                <div>
                    <label>Stock Mínimo:</label>
                    <input type="number" name="stockMinimo" step="0.01" min="0" required>
                </div>
            </div>

            <div class="row">
                <div>
                    <label>Unidad Base:</label>
                    <input type="text" name="unidadBase" placeholder="Ej: Metros, Rollos" required>
                </div>
                <div>
                    <label>Costo Unitario:</label>
                    <input type="number" name="costoUnitario" step="0.01" min="0" required>
                </div>
            </div>

            <button type="submit">Guardar Material</button>
        </form>
    </div>
    
    <a href="../index.html" class="volver-link">Volver al menú</a>

</body>
</html>
