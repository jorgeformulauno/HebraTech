<!DOCTYPE html>
<html lang="es">
<head>
    <link href="('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap')" rel="stylesheet">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Tareas - Hebratech</title>
    <style>
        /* 2. Selector universal para aplicar Graduate a TODO */
        * {
            font-family: "Graduate", serif;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 400px;
        }

        h2 {
            text-align: center;
            color: #01638a; /* Color corporativo Hebratech */
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #01638a; 
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #3498db;
        }

        a {
            display: block;
            text-align: center;
            text-decoration: none;
            color: #01638a;
            margin-top: 15px;
            font-size: 0.9em;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>REGISTRO TAREA</h2>
    
    <form action="procesar_tarea.php" method="POST">
        
        <div class="form-group">
            <label for="idProduccion">ID Producción Vinculada:</label>
            <input type="number" id="idProduccion" name="idProduccion" placeholder="Ej: 1" required>
        </div>

        <div class="form-group">
            <label for="nombreTarea">Nombre de la Tarea:</label>
            <input type="text" id="nombreTarea" name="nombreTarea" placeholder="Ej: Corte de tela" required>
        </div>

        <div class="form-group">
            <label for="fechaCreacion">Fecha de Creación:</label>
            <input type="date" id="fechaCreacion" name="fechaCreacion" required>
        </div>

        <div class="form-group">
            <label for="proceso">Proceso:</label>
            <select id="proceso" name="proceso">
                <option value="Corte">Corte</option>
                <option value="Confeccion">Confección</option>
                <option value="Bordado">Bordado</option>
                <option value="Estampado">Estampado</option>
                <option value="Planchado">Planchado</option>
                <option value="Control de Calidad">Control de Calidad</option>
            </select>
        </div>

        <div class="form-group">
            <label for="complejidad">Complejidad:</label>
            <select id="complejidad" name="complejidad">
                <option value="baja">Baja</option>
                <option value="media">Media</option>
                <option value="alta">Alta</option>
            </select>
        </div>

        <div class="form-group">
            <label for="descripcionTarea">Descripción:</label>
            <textarea id="descripcionTarea" name="descripcionTarea" placeholder="Escribe los detalles de la tarea..."></textarea>
        </div>

        <button type="submit">Guardar Tarea</button>
        
    </form>
    <a href="../index.html">Volver al Menú</a>
</div>

</body>
</html>
