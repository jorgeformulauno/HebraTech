<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Producción - Hebratech</title>
    
    <link href="('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap')" rel="stylesheet">

    <style>
        /* Mantenemos el estilo que te gustó */
        * {
            font-family: 'Graduate', serif;
        }

        body {
            background-color: #f8f9fa;
            margin: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            color: #333;
            text-align: center;
        }

        form {
            width: 450px; /* Un poco más ancho para los campos de costo */
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            font-size: 0.9em;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            margin-top: 25px;
            padding: 12px;
            width: 100%;
            background-color: #01638a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background-color: #3498db;
        }

        a {
            margin-top: 20px;
            text-decoration: none;
            color: #01638a;
            font-weight: bold;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row div {
            flex: 1;
        }
    </style>
</head>
<body>

    <h2>Registro de Producción</h2>

    <form action="guardar_produccion.php" method="POST">

        <div class="row">
            <div>
                <label for="idOrden">ID Orden</label>
                <input type="number" id="idOrden" name="idOrden" required>
            </div>
            <div>
                <label for="idProducto">ID Producto</label>
                <input type="number" id="idProducto" name="idProducto" required>
            </div>
        </div>

        <label for="descripcion">Descripción</label>
        <input type="text" id="descripcion" name="descripcion" placeholder="Detalles de la producción" required>

        <label for="cantidadRequerida">Cantidad Requerida</label>
        <input type="number" id="cantidadRequerida" name="cantidadRequerida" required>

        <div class="row">
            <div>
                <label for="fechaInicio">Fecha Inicio</label>
                <input type="date" id="fechaInicio" name="fechaInicio" required>
            </div>
            <div>
                <label for="fechaEstimadaFin">Fecha Estimada Fin</label>
                <input type="date" id="fechaEstimadaFin" name="fechaEstimadaFin" required>
            </div>
        </div>

        <label for="fechaRealFin">Fecha Real Fin</label>
        <input type="date" id="fechaRealFin" name="fechaRealFin">

        <div class="row">
            <div>
                <label for="costoEstimado">Costo Estimado</label>
                <input type="number" step="0.01" id="costoEstimado" name="costoEstimado" required>
            </div>
            <div>
                <label for="costoReal">Costo Real</label>
                <input type="number" step="0.01" id="costoReal" name="costoReal">
            </div>
        </div>

        <label for="estado">Estado de Producción</label>
        <select id="estado" name="estado" required>
            <option value="">Seleccione...</option>
            <option value="Planificada">Planificada</option>
            <option value="En Proceso">En Proceso</option>
            <option value="Completada">Completada</option>
            <option value="Cancelada">Cancelada</option>
        </select>

        <button type="submit">Guardar Producción</button>

    </form>

    <a href="../index.html">Volver al inicio</a>

</body>
</html>
