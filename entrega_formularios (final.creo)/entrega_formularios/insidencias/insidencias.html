<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Incidencias - Hebratech</title>
    
    <link href="('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap')" rel="stylesheet">

    <style>
        /* Mantenemos el CSS que te gustó */
        * {
            font-family: 'Graduate', serif;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        form {
            width: 100%;
            max-width: 450px;
        }

        fieldset {
            background-color: white;
            border: 2px solid #01638a;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        legend {
            font-size: 22px;
            font-weight: bold;
            color: #01638a;
            padding: 0 10px;
            background-color: white;
            border-radius: 5px;
        }

        p {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #3498db;
            outline: none;
        }

        input[type="submit"] {
            background-color: #01638a;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            padding: 12px;
            transition: background 0.3s;
        }

        input[type="submit"]:hover {
            background-color: #3498db;
        }

        .volver-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #01638a;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <form action="procesar_incidencia.php" method="POST">
        <fieldset>
            <legend>REGISTRO DE INCIDENCIAS</legend>
            
            <p>
                <label>ID Operario:</label>
                <input type="number" name="idOperario" placeholder="Ej: 101" required/>
            </p>

            <p>
                <label>Tipo de Incidencia:</label>
                <input type="text" name="tipoIncidencia" placeholder="Ej: Fallo técnico, Ausencia..." required/>
            </p>

            <p>
                <label>Descripción:</label>
                <textarea name="descripcion" placeholder="Detalles de lo sucedido..."></textarea>
            </p>

            <p>
                <label>Periodo Evaluado:</label>
                <input type="text" name="periodoEvaluado" placeholder="Ej: Abril 2026" required/>
            </p>

            <p>
                <label>Estado:</label>
                <select name="estado" required>
                    <option value="">Seleccione estado...</option>
                    <option value="Activo">Activo</option>
                    <option value="En Revisión">En Revisión</option>
                    <option value="Resuelto">Resuelto</option>
                </select>
            </p>

            <p>
                <label>Fecha Generación:</label>
                <input type="date" name="fechaGeneracion" required/>
            </p>

            <p>
                <label>Fecha Revisión:</label>
                <input type="date" name="fechaRevision"/>
            </p>

            <input type="submit" value="Guardar Incidencia">
        </fieldset>
    </form>

    <a href="../index.html" class="volver-link">Volver al menú</a>

</body>
</html>
